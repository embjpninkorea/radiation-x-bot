name: Daily Radioactivity Update

on:
  schedule:
    # 平日 09:00（日本時間）
    - cron: "0 0 * * 1-5"
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 tweepy

      - name: Run script
        env:
          CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: |
          python fetch_and_post.py
